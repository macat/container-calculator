<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Container Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Shared layout banner -->
    <div id="shared-banner" class="shared-banner" style="display:none">
      📎 Shared container layout — edit freely
      <button class="banner-dismiss" onclick="dismissBanner()">✕</button>
    </div>

    <header>
      <h1>📦 Container Calculator</h1>
      <div class="header-controls">
        <div class="toolbar-actions">
          <button class="toolbar-btn" onclick="shareLayout()" title="Copy shareable link">🔗 Share</button>
          <button class="toolbar-btn" onclick="exportPDF()" title="Export as PDF">📄 Export PDF</button>
        </div>
        <div class="container-toggle">
          <button id="btn-20ft" class="toggle-btn active" onclick="setContainer(20)">20ft</button>
          <button id="btn-40ft" class="toggle-btn" onclick="setContainer(40)">40ft</button>
        </div>
      </div>
    </header>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <div class="main-layout">
      <!-- Left panel: rooms & items -->
      <div class="panel-left">
        <div class="stats-bar">
          <div class="stat">
            <span class="stat-label">Used</span>
            <span class="stat-value" id="stat-used">0 cu ft</span>
          </div>
          <div class="stat">
            <span class="stat-label">Remaining</span>
            <span class="stat-value" id="stat-remaining">1,172 cu ft</span>
          </div>
          <div class="stat">
            <span class="stat-label">Items</span>
            <span class="stat-value" id="stat-items">0</span>
          </div>
        </div>

        <div class="fill-bar-container">
          <div class="fill-bar" id="fill-bar" style="width: 0%"></div>
          <span class="fill-label" id="fill-label">0%</span>
        </div>

        <div class="rooms-container" id="rooms-container">
          <!-- Rooms injected here -->
        </div>

        <button class="btn-add-room" onclick="addRoomPrompt()">+ Add Room</button>
      </div>

      <!-- Right panel: 3D view -->
      <div class="panel-right">
        <div id="three-container"></div>
        <div id="overflow-warning" class="overflow-warning" style="display:none"></div>
        <div class="view-controls">
          <button onclick="resetCamera()">Reset View</button>
          <button onclick="toggleWireframe()">Toggle Wireframe</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Room Modal -->
  <div class="modal-overlay" id="modal-add-room" style="display:none">
    <div class="modal">
      <h3>Add Room</h3>
      <input type="text" id="input-room-name" placeholder="Room name" autofocus>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('modal-add-room')">Cancel</button>
        <button class="btn-confirm" onclick="confirmAddRoom()">Add</button>
      </div>
    </div>
  </div>

  <!-- Add Item Modal -->
  <div class="modal-overlay" id="modal-add-item" style="display:none">
    <div class="modal">
      <h3>Add Item</h3>
      <input type="text" id="input-item-name" placeholder="Item name">
      <div class="dim-row">
        <div class="dim-field">
          <label>L (in)</label>
          <input type="number" id="input-item-l" min="1" value="18">
        </div>
        <div class="dim-field">
          <label>W (in)</label>
          <input type="number" id="input-item-w" min="1" value="18">
        </div>
        <div class="dim-field">
          <label>H (in)</label>
          <input type="number" id="input-item-h" min="1" value="24">
        </div>
        <div class="dim-field">
          <label>Qty</label>
          <input type="number" id="input-item-qty" min="1" value="1">
        </div>
      </div>
      <div class="preset-row">
        <span class="preset-label">Presets:</span>
        <button class="preset-btn" onclick="applyPreset('wardrobe-box')">Wardrobe Box</button>
        <button class="preset-btn" onclick="applyPreset('book-box')">Book Box</button>
        <button class="preset-btn" onclick="applyPreset('medium-box')">Medium Box</button>
        <button class="preset-btn" onclick="applyPreset('small-box')">Small Box</button>
        <button class="preset-btn" onclick="applyPreset('artwork-box')">Artwork Box</button>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('modal-add-item')">Cancel</button>
        <button class="btn-confirm" onclick="confirmAddItem()">Add</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
